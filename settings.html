<!doctype html>
<html lang="zh-CN" data-view="settings">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmbientCard Settings</title>
  </head>
  <body data-view="settings">
    <div id="root" style="min-height: 100vh; background: #0d0d0f;">
      <section
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0d0d0f;
          color: rgba(255, 255, 255, 0.6);
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        "
      >
        <div style="text-align: center;">
          <div style="
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "></div>
          <div style="font-size: 14px; font-weight: 500;">设置页加载中...</div>
          <div style="font-size: 12px; opacity: 0.5; margin-top: 8px;">正在读取本地设置、词库和复习状态</div>
        </div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
        </style>
      </section>
    </div>
    <script type="module" src="/src/settings.tsx"></script>
  </body>
</html>
